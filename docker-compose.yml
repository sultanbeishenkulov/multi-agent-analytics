services:

  db:
    image: postgres:16-alpine
    container_name: analytics-db
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: analytics-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://analyst:analyst_pass@db:5432/analytics
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data   # persist memory.db alongside schema files
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
